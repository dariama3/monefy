services:
  frontend:
    build:
      context: ./frontend
    container_name: nuxt
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NUXT_PUBLIC_API_URL: http://laravel:8000/api
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: laravel
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - monefy_db

  monefy_db:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
